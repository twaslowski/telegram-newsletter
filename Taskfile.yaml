version: "3"
tasks:

  dev:
    desc: Start local development environment (auto-registers webhook)
    cmd: ./scripts/dev-local.sh

  register:*:
    desc: Register Telegram webhook for a given environment (prod/local)
    vars:
      ENV: "{{index .MATCH 0}}"
    dotenv:
      - .env.{{ .ENV }}
    cmd: curl "https://api.telegram.org/bot$BOT_TOKEN/setWebhook?url=$WORKER_URL/webhook&secret_token=$WEBHOOK_SECRET"

  broadcast:local:
    desc: Send an update to all subscribers (local)
    cmd: ./scripts/broadcast-local.sh {{ .CLI_ARGS }}

  broadcast:prod:
    desc: Send an update to all subscribers (production - requires confirmation)
    cmd: ./scripts/broadcast-prod.sh {{ .CLI_ARGS }}
